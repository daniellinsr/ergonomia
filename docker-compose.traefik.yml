version: '3.8'

# Redes
networks:
  traefik-public:
    name: traefik-public
    driver: bridge
  ergonomia-internal:
    name: ergonomia-internal
    driver: bridge

# Volumes persistentes
volumes:
  postgres-data:
    driver: local
  postgres-backups:
    driver: local
  traefik-certificates:
    driver: local

services:
  # ============================================
  # Traefik - Proxy Reverso + SSL Automático
  # ============================================
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik-public
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS
      - "8080:8080" # Dashboard (remover em produção ou proteger)
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      # Socket do Docker para descoberta automática
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Configurações do Traefik
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic:/dynamic:ro
      # Certificados SSL
      - traefik-certificates:/certificates
    labels:
      # Habilitar Traefik para este container
      - "traefik.enable=true"

      # Dashboard do Traefik (opcional - comentar em produção)
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.helthcorp.com.br`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"

      # Middleware de autenticação básica para dashboard
      # Gerar senha: echo $(htpasswd -nB admin) | sed -e s/\\$/\\$\\$/g
      # Usuário: admin / Senha: admin (ALTERAR!)
      - "traefik.http.middlewares.traefik-auth.basicauth.users=admin:$$2y$$05$$qvbzJQMfKVJZ7r8u7x1qH.Qw6p8EzNpJmJMjGvJvQqKvCqJ5yrFYC"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: ergonomia-postgres
    restart: unless-stopped
    networks:
      - ergonomia-internal
    environment:
      POSTGRES_DB: ${DB_NAME:-ergonomia_db}
      POSTGRES_USER: ${DB_USER:-ergonomia_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=pt_BR.UTF-8"
      TZ: America/Sao_Paulo
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-backups:/backups
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ergonomia_user} -d ${DB_NAME:-ergonomia_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # Backend API - Node.js/Express
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ergonomia-backend
    restart: unless-stopped
    networks:
      - traefik-public
      - ergonomia-internal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ergonomia_db}
      DB_USER: ${DB_USER:-ergonomia_user}
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      JWT_SECRET: ${JWT_SECRET:?JWT secret required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT refresh secret required}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: https://${DOMAIN:-ergonomia.helthcorp.com.br}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-200}
      TZ: America/Sao_Paulo
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    labels:
      # Habilitar Traefik
      - "traefik.enable=true"

      # Roteamento HTTP (redirecionar para HTTPS)
      - "traefik.http.routers.backend-http.rule=Host(`${DOMAIN:-ergonomia.helthcorp.com.br}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.middlewares=redirect-to-https"

      # Roteamento HTTPS
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN:-ergonomia.helthcorp.com.br}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"

      # Service
      - "traefik.http.services.backend.loadbalancer.server.port=3001"

      # Middlewares
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

  # ============================================
  # Frontend - React + Nginx
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ergonomia-frontend
    restart: unless-stopped
    networks:
      - traefik-public
    depends_on:
      - backend
    environment:
      TZ: America/Sao_Paulo
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    labels:
      # Habilitar Traefik
      - "traefik.enable=true"

      # Roteamento HTTP (redirecionar para HTTPS)
      - "traefik.http.routers.frontend-http.rule=Host(`${DOMAIN:-ergonomia.helthcorp.com.br}`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=redirect-to-https"

      # Roteamento HTTPS
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-ergonomia.helthcorp.com.br}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.priority=1"

      # Service
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

      # Headers de segurança
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.routers.frontend.middlewares=security-headers"

  # ============================================
  # Backup Automático PostgreSQL
  # ============================================
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:15-alpine
    container_name: ergonomia-backup
    restart: unless-stopped
    networks:
      - ergonomia-internal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DB_NAME:-ergonomia_db}
      POSTGRES_USER: ${DB_USER:-ergonomia_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_EXTRA_OPTS: -Z9 --schema=public --blobs
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
      TZ: America/Sao_Paulo
    volumes:
      - postgres-backups:/backups
