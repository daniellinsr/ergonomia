version: '3.8'

networks:
  ergonomia-network:
    driver: overlay
    attachable: true
  web-swarm:
    external: true

volumes:
  postgres-data:
  postgres-backups:

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=pt_BR.UTF-8"
      TZ: America/Sao_Paulo
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-backups:/backups
    networks:
      - ergonomia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  backend:
    image: ergonomia-backend:latest
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      FRONTEND_URL: ${FRONTEND_URL}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
      TZ: America/Sao_Paulo
    networks:
      - ergonomia-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      endpoint_mode: vip

  frontend:
    image: ergonomia-frontend:latest
    depends_on:
      - backend
    environment:
      TZ: America/Sao_Paulo
    networks:
      - ergonomia-network
      - web-swarm
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      endpoint_mode: vip
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=web-swarm"
        - "traefik.http.routers.ergonomia.rule=Host(`ergonomia.helthcorp.com.br`)"
        - "traefik.http.routers.ergonomia.entrypoints=websecure"
        - "traefik.http.routers.ergonomia.tls=true"
        - "traefik.http.routers.ergonomia.tls.certresolver=lets-encrypt"
        - "traefik.http.services.ergonomia.loadbalancer.server.port=80"
        - "traefik.http.middlewares.ergonomia-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.ergonomia-redirect.redirectscheme.permanent=true"
        - "traefik.http.routers.ergonomia-http.rule=Host(`ergonomia.helthcorp.com.br`)"
        - "traefik.http.routers.ergonomia-http.entrypoints=web"
        - "traefik.http.routers.ergonomia-http.middlewares=ergonomia-redirect"

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:18-alpine
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_EXTRA_OPTS: -Z9 --schema=public --blobs
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      TZ: America/Sao_Paulo
    volumes:
      - postgres-backups:/backups
    networks:
      - ergonomia-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
