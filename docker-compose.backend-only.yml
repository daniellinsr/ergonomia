version: '3.8'

# =====================================================
# Stack Portainer - Backend Only
# Frontend: Netlify (https://ergonomiahomolog.netlify.app)
# Database: PostgreSQL externo (77.37.41.41)
# =====================================================

networks:
  # Rede interna entre serviços desta stack
  ergonomia-backend-net:
    driver: overlay
    attachable: true

  # Rede externa do Traefik (já existente no servidor)
  web-swarm:
    external: true

services:
  backend:
    image: daniellinsr/ergonomia-backend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001

      # Banco de dados externo no VPS
      DB_HOST: ${DB_HOST:-77.37.41.41}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-ergonomia_db}
      DB_USER: ${DB_USER:-ergonomia_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatório}

      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatório}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET obrigatório}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      # CORS - URL do frontend no Netlify
      FRONTEND_URL: ${FRONTEND_URL:-https://ergonomiahomolog.netlify.app}

      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-200}

      TZ: America/Sao_Paulo

    networks:
      - ergonomia-backend-net
      - web-swarm

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        # Traefik - Habilitar roteamento para o backend
        - "traefik.enable=true"
        - "traefik.docker.network=web-swarm"

        # Roteador HTTPS
        - "traefik.http.routers.ergonomia-api.rule=Host(`${TRAEFIK_API_HOST:-api.ergonomia.helthcorp.com.br}`)"
        - "traefik.http.routers.ergonomia-api.entrypoints=websecure"
        - "traefik.http.routers.ergonomia-api.tls=true"
        - "traefik.http.routers.ergonomia-api.tls.certresolver=lets-encrypt"

        # Serviço aponta para a porta 3001 do backend
        - "traefik.http.services.ergonomia-api.loadbalancer.server.port=3001"

        # Roteador HTTP → redireciona para HTTPS
        - "traefik.http.middlewares.ergonomia-api-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.ergonomia-api-redirect.redirectscheme.permanent=true"
        - "traefik.http.routers.ergonomia-api-http.rule=Host(`${TRAEFIK_API_HOST:-api.ergonomia.helthcorp.com.br}`)"
        - "traefik.http.routers.ergonomia-api-http.entrypoints=web"
        - "traefik.http.routers.ergonomia-api-http.middlewares=ergonomia-api-redirect"
